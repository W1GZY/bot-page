    document.addEventListener('DOMContentLoaded', () => {
        const navContainer = document.getElementById('docsNavLinks');
        const contentContainer = document.getElementById('docsContent');

        if (!navContainer || !contentContainer) return;

        docsData.forEach((doc, idx) => {
            const navLink = document.createElement('a');
            navLink.href = `#${doc.id}`;
            navLink.className = `docs-nav-link ${idx === 0 ? 'active' : ''}`;
            navLink.innerHTML = `<i class="ph ${doc.icon}"></i> ${doc.title}`;
            navContainer.appendChild(navLink);

            const article = document.createElement('article');
            article.className = 'docs-article';
            article.id = doc.id;

            let html = `
                <h2><i class="ph ${doc.icon}" style="color: var(--accent);"></i> ${doc.title}</h2>
                <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 4px; margin-bottom: 20px;">${doc.subtitle}</p>
            `;

            doc.content.forEach(item => {
                if (item.type === 'heading') {
                    html += `<h3>${item.text}</h3>`;
                } else if (item.type === 'text') {
                    html += `<p>${item.text}</p>`;
                } else if (item.type === 'callout') {
                    html += `
                        <div class="callout-box">
                            <strong>${item.icon || '💡'} ${item.title}:</strong> ${item.text}
                        </div>
                    `;
                } else if (item.type === 'list') {
                    if (item.title) html += `<h3>${item.title}</h3>`;
                    html += `<ul>${item.items.map(i => `<li>${i}</li>`).join('')}</ul>`;
                } else if (item.type === 'commands') {
                    if (item.title) html += `<h3>${item.title}</h3>`;
                    html += `<ul>${item.items.map(i => `<li><code>${i.cmd}</code> —${i.desc}</li>`).join('')}</ul>`;
                }
            });

            article.innerHTML = html;
            contentContainer.appendChild(article);
        });

        const searchInput = document.getElementById('docSearch');
        searchInput?.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            document.querySelectorAll('.docs-article').forEach(article => {
                const match = !query || article.textContent.toLowerCase().includes(query);
                article.style.display = match ? 'block' : 'none';
            });
        });

        const navLinks = document.querySelectorAll('.docs-nav-link');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    navLinks.forEach(l => l.classList.remove('active'));
                    const active = document.querySelector(`.docs-nav-link[href="#${entry.target.id}"]`);
                    active?.classList.add('active');
                }
            });
        }, { rootMargin: '-20% 0px -60% 0px', threshold: 0 });

        document.querySelectorAll('.docs-article').forEach(a => observer.observe(a));
    });
</script>

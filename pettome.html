<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeanBot - Wizard101 Pet Tome</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <script>
        const savedAccent = localStorage.getItem('seanbotAccent') || 'gold';
        document.documentElement.setAttribute('data-accent', savedAccent);
    </script>
    <link rel="stylesheet" href="global.css">
    <script src="layout.js" defer></script>
</head>
<body data-nav="pettome" data-title="Pet Tome">
    <div class="content">
        <!-- Page Header -->
        <div class="auto-fade-in" style="margin-bottom: 32px; animation-delay: 0s;">
            <h1 style="margin: 0; font-size: 2.2rem; font-weight: 800; letter-spacing: -0.5px;">Wizard101 Pet Tome</h1>
            <p style="color: var(--text-secondary); margin-top: 8px; font-size: 0.95rem;">
                Explore Wow Factors, schools, egg types, and body return ratios for hatching Wizard101 pets.
            </p>
        </div>

        <!-- Controls: Search & Filters -->
        <div class="glass-card auto-fade-in" style="padding: 20px; margin-bottom: 30px; animation-delay: 0.05s;">
            <div style="display: flex; gap: 16px; flex-wrap: wrap; align-items: center;">
                <div class="search-container" style="flex: 1; min-width: 260px; margin-bottom: 0;">
                    <i class="ph ph-magnifying-glass" style="color: var(--text-secondary); font-size: 1.2rem;"></i>
                    <input type="text" id="petSearch" placeholder="Search pet by name (e.g. Dragon, Cerberus, Piggle)...">
                </div>

                <div style="display: flex; gap: 12px; align-items: center;">
                    <select id="schoolFilter" style="background: rgba(0,0,0,0.4); color: #fff; border: 1px solid var(--border); padding: 12px; border-radius: 10px; outline: none; cursor: pointer; font-family: inherit;">
                        <option value="all">All Schools</option>
                        <option value="Fire">Fire</option>
                        <option value="Ice">Ice</option>
                        <option value="Storm">Storm</option>
                        <option value="Myth">Myth</option>
                        <option value="Life">Life</option>
                        <option value="Death">Death</option>
                        <option value="Balance">Balance</option>
                    </select>

                    <select id="wowFilter" style="background: rgba(0,0,0,0.4); color: #fff; border: 1px solid var(--border); padding: 12px; border-radius: 10px; outline: none; cursor: pointer; font-family: inherit;">
                        <option value="all">All Wow Factors</option>
                        <option value="10">Wow Factor 10 (Rare)</option>
                        <option value="9">Wow Factor 9</option>
                        <option value="8">Wow Factor 8</option>
                        <option value="7">Wow Factor 7</option>
                        <option value="6">Wow Factor 6</option>
                        <option value="5">Wow Factor 5</option>
                        <option value="1">Wow Factor 1 (Common)</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Table Display -->
        <div class="custom-table-wrapper auto-fade-in" style="animation-delay: 0.1s;">
            <table class="custom-table" id="petTable">
                <thead>
                    <tr>
                        <th>Pet Name</th>
                        <th>School</th>
                        <th>Wow Factor</th>
                        <th>Egg Name</th>
                        <th>Body Group</th>
                    </tr>
                </thead>
                <tbody id="petTableBody">
                    <!-- Populated via JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const samplePets = [
            { name: "Able Racoon", school: "Storm", wow: 8, egg: "Maelstrom Egg", body: "Racoon" },
            { name: "Acid Rain Core", school: "Death", wow: 7, egg: "Stormy Egg", body: "Rain Core" },
            { name: "Adventurous Racoon", school: "Myth", wow: 8, egg: "Enigmatic Egg", body: "Racoon" },
            { name: "Afflicted Treant", school: "Death", wow: 9, egg: "Mysterious Egg", body: "Treant" },
            { name: "Alert Hound", school: "Myth", wow: 9, egg: "Chimerical Egg", body: "Hound" },
            { name: "Alien Piggle", school: "Moon", wow: 5, egg: "Enigmatic Egg", body: "Piggle" },
            { name: "Amaranthine Hound", school: "Storm", wow: 9, egg: "Stormsquall Egg", body: "Hound" },
            { name: "Amber Shenlong Dragon", school: "Myth", wow: 9, egg: "Lifebloom Egg", body: "Shenlong Dragon" },
            { name: "Apophis' Scarab", school: "Fire", wow: 8, egg: "Radiant Egg", body: "Jeweled Scarab" },
            { name: "Aqua Dragon", school: "Ice", wow: 9, egg: "Frost Shelled Egg", body: "Dragon" },
            { name: "Arcane Golem", school: "Myth", wow: 7, egg: "Shivering Egg", body: "Borealis Golem" },
            { name: "Archfiend", school: "Death", wow: 9, egg: "Onyx Egg", body: "Wraith" },
            { name: "Arctic Cat", school: "Ice", wow: 8, egg: "Frost Shelled Egg", body: "Firecat" },
            { name: "Armordillo", school: "Balance", wow: 8, egg: "Equilibrium Egg", body: "Armordillo" },
            { name: "Avenging Fossil", school: "Death", wow: 8, egg: "Necromantic Egg", body: "Stegosaurus" },
            { name: "Balance Armaments", school: "Balance", wow: 9, egg: "Duelist's Egg", body: "Armament" },
            { name: "Balance Hamster", school: "Balance", wow: 9, egg: "Equilibrium Egg", body: "Hamster" },
            { name: "Basilisk", school: "Balance", wow: 9, egg: "Symmetrical Egg", body: "Basilisk" },
            { name: "Blaze Beast", school: "Fire", wow: 7, egg: "Radiant Egg", body: "Winged Beast" },
            { name: "Bloodbat", school: "Myth", wow: 1, egg: "Equilibrium Egg", body: "Bloodbat" },
            { name: "Cerberus", school: "Myth", wow: 9, egg: "Chimerical Egg", body: "Orthrus" },
            { name: "Chimera", school: "Balance", wow: 9, egg: "Otherworldly Egg", body: "Chimera" },
            { name: "Clockwork Paladin", school: "Balance", wow: 10, egg: "Otherworldly Egg", body: "Unique" },
            { name: "Cyclops", school: "Myth", wow: 6, egg: "Enigmatic Egg", body: "Cyclops" },
            { name: "Dragon", school: "Balance", wow: 1, egg: "Symmetrical Egg", body: "Dragon" },
            { name: "Efreet", school: "Fire", wow: 9, egg: "Radiant Egg", body: "Efreet" },
            { name: "Firecat", school: "Fire", wow: 1, egg: "Radiant Egg", body: "Firecat" },
            { name: "Forest Lord", school: "Life", wow: 9, egg: "Jade Egg", body: "Forest Lord" },
            { name: "Helephant", school: "Fire", wow: 8, egg: "Pyromantic Egg", body: "Oni" },
            { name: "Hydra", school: "Balance", wow: 8, egg: "Symmetrical Egg", body: "Hydra" },
            { name: "Ice Colossus", school: "Ice", wow: 8, egg: "Frost Shelled Egg", body: "Colossus" },
            { name: "Kraken", school: "Storm", wow: 9, egg: "Maelstrom Egg", body: "Kraken" },
            { name: "Orthrus", school: "Myth", wow: 8, egg: "Chimerical Egg", body: "Orthrus" },
            { name: "Phoenix", school: "Fire", wow: 9, egg: "Radiant Egg", body: "Phoenix" },
            { name: "Satyr", school: "Life", wow: 8, egg: "Jade Egg", body: "Satyr" },
            { name: "Stormzilla", school: "Storm", wow: 8, egg: "Maelstrom Egg", body: "Stormzilla" },
            { name: "Wraith", school: "Death", wow: 8, egg: "Necromantic Egg", body: "Wraith" }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            const tableBody = document.getElementById('petTableBody');
            const searchInput = document.getElementById('petSearch');
            const schoolSelect = document.getElementById('schoolFilter');
            const wowSelect = document.getElementById('wowFilter');

            function renderPets() {
                const query = searchInput.value.toLowerCase();
                const school = schoolSelect.value;
                const wow = wowSelect.value;

                const filtered = samplePets.filter(pet => {
                    const matchesName = pet.name.toLowerCase().includes(query);
                    const matchesSchool = school === 'all' || pet.school === school;
                    const matchesWow = wow === 'all' || pet.wow.toString() === wow;
                    return matchesName && matchesSchool && matchesWow;
                });

                if (filtered.length === 0) {
                    tableBody.innerHTML = `
                        <tr>
                            <td colspan="5" style="text-align: center; color: var(--text-secondary); padding: 30px;">
                                No pets found matching your criteria.
                            </td>
                        </tr>
                    `;
                    return;
                }

                tableBody.innerHTML = filtered.map(pet => {
                    const schoolClass = `school-${pet.school.toLowerCase()}`;
                    return `
                        <tr>
                            <td style="font-weight: 700; color: #fff;">${pet.name}</td>
                            <td><span class="school-badge ${schoolClass}">${pet.school}</span></td>
                            <td><strong style="color: var(--accent);">${pet.wow}</strong> / 10</td>
                            <td>${pet.egg}</td>
                            <td>${pet.body}</td>
                        </tr>
                    `;
                }).join('');
            }

            searchInput.addEventListener('input', renderPets);
            schoolSelect.addEventListener('change', renderPets);
            wowSelect.addEventListener('change', renderPets);

            renderPets();
        });
    </script>
</body>
</html>

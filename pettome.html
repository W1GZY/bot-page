    ];

    let currentFilteredPets = [...petDatabase];
    let currentPage = 1;
    const pageSize = 10;

    function getSchoolBadgeClass(school) {
        const s = (school || '').toLowerCase();
        if (s === 'fire') return 'school-fire';
        if (s === 'ice') return 'school-ice';
        if (s === 'storm') return 'school-storm';
        if (s === 'myth') return 'school-myth';
        if (s === 'life') return 'school-life';
        if (s === 'death') return 'school-death';
        if (s === 'balance') return 'school-balance';
        return 'school-balance';
    }

    function getSchoolIcon(school) {
        const s = (school || '').toLowerCase();
        if (s === 'fire') return '🔥';
        if (s === 'ice') return '❄️';
        if (s === 'storm') return '⚡';
        if (s === 'myth') return '👁️';
        if (s === 'life') return '🍃';
        if (s === 'death') return '💀';
        if (s === 'balance') return '⚖️';
        return '🐾';
    }

    function filterPets() {
        const searchVal = (document.getElementById('petSearch').value || '').toLowerCase().trim();
        const schoolVal = document.getElementById('schoolFilter').value;
        const wowVal = document.getElementById('wowFilter').value;

        currentFilteredPets = petDatabase.filter(pet => {
            const matchSearch = !searchVal || 
                pet.name.toLowerCase().includes(searchVal) || 
                pet.body.toLowerCase().includes(searchVal) || 
                pet.egg.toLowerCase().includes(searchVal);
            
            const matchSchool = schoolVal === 'all' || pet.school.toLowerCase() === schoolVal.toLowerCase();
            const matchWow = wowVal === 'all' || pet.wow.toString() === wowVal;

            return matchSearch && matchSchool && matchWow;
        });

        currentPage = 1;
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('petTableBody');
        tbody.innerHTML = '';

        const total = currentFilteredPets.length;
        if (total === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="6" style="text-align: center; color: var(--text-secondary); padding: 40px;">
                        <i class="ph ph-warning-circle" style="font-size: 1.8rem; color: var(--accent); margin-bottom: 8px; display: block;"></i>
                        No pets found matching your filter criteria.
                    </td>
                </tr>
            `;
            document.getElementById('pageInfo').innerText = 'Showing 0 of 0 pets';
            document.getElementById('prevPageBtn').disabled = true;
            document.getElementById('nextPageBtn').disabled = true;
            return;
        }

        const totalPages = Math.ceil(total / pageSize);
        if (currentPage > totalPages) currentPage = totalPages;

        const startIdx = (currentPage - 1) * pageSize;
        const pagePets = currentFilteredPets.slice(startIdx, startIdx + pageSize);

        pagePets.forEach((pet) => {
            const tr = document.createElement('tr');
            tr.className = 'clickable-row';
            tr.onclick = () => openModal(pet);

            tr.innerHTML = `
                <td style="font-weight: 700; color: #fff;">
                    <span style="margin-right: 6px;">${getSchoolIcon(pet.school)}</span> ${pet.name}
                </td>
                <td><span class="school-badge ${getSchoolBadgeClass(pet.school)}">${pet.school}</span></td>
                <td><strong style="color: var(--accent);">${pet.wow}</strong> <span style="font-size: 0.75rem; color: var(--text-muted);">/ 10</span></td>
                <td style="color: var(--text-secondary);">${pet.egg}</td>
                <td style="color: var(--text-secondary);">${pet.body}</td>
                <td style="text-align: right;">
                    <button class="btn-secondary" style="padding: 4px 10px; font-size: 0.75rem;" onclick="event.stopPropagation(); openModalByPetName('${pet.name.replace(/'/g, "\\'")}')">
                        <i class="ph ph-eye"></i> Details
                    </button>
                </td>
            `;
            tbody.appendChild(tr);
        });

        const endIdx = Math.min(startIdx + pageSize, total);
        document.getElementById('pageInfo').innerText = `Showing ${startIdx + 1}-${endIdx} of ${total} pets`;
        document.getElementById('prevPageBtn').disabled = currentPage <= 1;
        document.getElementById('nextPageBtn').disabled = currentPage >= totalPages;
    }

    function openModalByPetName(name) {
        const pet = petDatabase.find(p => p.name === name);
        if (pet) openModal(pet);
    }

    function openModal(pet) {
        document.getElementById('modalPetName').innerText = pet.name;
        document.getElementById('modalSchoolIcon').innerText = getSchoolIcon(pet.school);

        const badge = document.getElementById('modalSchoolBadge');
        badge.innerText = pet.school;
        badge.className = `school-badge ${getSchoolBadgeClass(pet.school)}`;

        document.getElementById('modalWow').innerText = pet.wow;
        document.getElementById('modalEgg').innerText = pet.egg;
        document.getElementById('modalBody').innerText = pet.body;
        document.getElementById('modalPatch').innerText = pet.patch || '1.00';

        const pillsContainer = document.getElementById('modalHatchingPills');
        pillsContainer.innerHTML = `
            <span class="tag-pill ${pet.kiosk ? 'yes' : 'no'}"><i class="ph ${pet.kiosk ? 'ph-check-circle' : 'ph-x-circle'}"></i> Kiosk Allowed</span>
            <span class="tag-pill ${pet.hatchable ? 'yes' : 'no'}"><i class="ph ${pet.hatchable ? 'ph-check-circle' : 'ph-x-circle'}"></i> Hatchable</span>
            <span class="tag-pill ${pet.tradeable ? 'yes' : 'no'}"><i class="ph ${pet.tradeable ? 'ph-check-circle' : 'ph-x-circle'}"></i> Tradeable</span>
            <span class="tag-pill ${pet.sellable ? 'yes' : 'no'}"><i class="ph ${pet.sellable ? 'ph-check-circle' : 'ph-x-circle'}"></i> Sellable</span>
        `;

        document.getElementById('modalRequirements').innerHTML = `
            <div><span style="color: var(--text-secondary);">Level Requirement:</span> ${pet.levelReq || 'None'}</div>
            <div><span style="color: var(--text-secondary);">School Requirement:</span> ${pet.schoolReq || 'Universal'}</div>
        `;

        document.getElementById('modalSources').innerText = pet.sources || 'Hatchmaking Kiosk, World Boss Drops';

        document.getElementById('petModal').classList.add('open');
    }

    function closeModal() {
        document.getElementById('petModal').classList.remove('open');
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderTable();

        document.getElementById('petSearch').addEventListener('input', filterPets);
        document.getElementById('schoolFilter').addEventListener('change', filterPets);
        document.getElementById('wowFilter').addEventListener('change', filterPets);

        document.getElementById('prevPageBtn').addEventListener('click', () => {
            if (currentPage > 1) { currentPage--; renderTable(); }
        });

        document.getElementById('nextPageBtn').addEventListener('click', () => {
            const totalPages = Math.ceil(currentFilteredPets.length / pageSize);
            if (currentPage < totalPages) { currentPage++; renderTable(); }
        });

        document.getElementById('refreshBtn').addEventListener('click', () => {
            filterPets();
        });

        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        document.getElementById('petModal').addEventListener('click', (e) => {
            if (e.target.id === 'petModal') closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    });
</script>

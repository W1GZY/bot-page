<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error 404</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>

    <script>
        const savedAccent = localStorage.getItem('seanbotAccent') || 'gold';
        document.documentElement.setAttribute('data-accent', savedAccent);
    </script>
    <link rel="stylesheet" href="global.css">
    <script src="layout.js" defer></script>
</head>

<body data-nav="none" data-title="Error 404">

    <div class="content" style="display: flex; align-items: center; justify-content: center;">
        <div style="text-align: center;" class="auto-fade-in">
            <div style="font-size: 5rem; color: var(--accent); margin-bottom: 10px; opacity: 0.9;">
                <i class="ph-duotone ph-warning-circle"></i>
            </div>
            <h1 style="font-size: 6rem; font-weight: 900; color: #fff; margin: 0; line-height: 1; letter-spacing: -2px;">404</h1>
            <h2 style="font-size: 1.6rem; color: var(--accent); margin-top: 15px; font-weight: 700;">Lost in the void?</h2>
            <p style="color: var(--text-secondary); margin: 15px auto 0 auto; font-size: 1.1rem; max-width: 400px; line-height: 1.6;">
                The page you're looking for doesn't exist or has been moved to a new timeline.
            </p>
            <a href="/" class="btn-large btn-primary" style="margin-top: 20px;"><i class="ph ph-house"></i> Take me home</a>
        </div>
    </div>

</body>
</html>
